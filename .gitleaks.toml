title = "MidwayCleaning Gitleaks Configuration"

[allowlist]
description = "Global allowlist"
paths = [
  '''node_modules''',
  '''\.next''',
  '''\.git''',
  '''\.env\.example''',
  '''package-lock\.json''',
]

# Allow CI test dummy values
regexTarget = "line"
regexes = [
  '''test_resend_key''',
  '''test_key''',
  '''test_secret''',
  '''test-bucket''',
]
