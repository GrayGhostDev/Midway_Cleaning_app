services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: midway-cleaning-app
    container_name: midway-app
    ports:
      - "8003:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.ggdc.project: "midway-cleaning"
      com.ggdc.service: "midway-app"
      com.ggdc.level: "3"
    networks:
      - midway-net
      - ggdc-shared-net

  db:
    image: postgres:15-alpine
    container_name: midway-postgres
    ports:
      - "127.0.0.1:5438:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.ggdc.project: "midway-cleaning"
      com.ggdc.service: "midway-postgres"
      com.ggdc.level: "3"
    networks:
      - midway-net

  redis:
    image: redis:7-alpine
    container_name: midway-redis
    ports:
      - "127.0.0.1:6384:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.ggdc.project: "midway-cleaning"
      com.ggdc.service: "midway-redis"
      com.ggdc.level: "3"
    networks:
      - midway-net

  backup:
    image: postgres:15-alpine
    container_name: midway-backup
    volumes:
      - ./backups:/backups
      - postgres_data:/var/lib/postgresql/data:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - BACKUP_KEEP_DAYS=7
      - BACKUP_FREQUENCY=1d
    entrypoint: |
      sh -c 'while true; do
        timestamp=$$(date +%Y%m%d_%H%M%S);
        pg_dump -h db -U $$POSTGRES_USER -d $$POSTGRES_DB -F c -f /backups/backup_$$timestamp.dump;
        find /backups -type f -mtime +$$BACKUP_KEEP_DAYS -delete;
        sleep $$BACKUP_FREQUENCY;
      done'
    depends_on:
      - db
    labels:
      com.ggdc.project: "midway-cleaning"
      com.ggdc.service: "midway-backup"
      com.ggdc.level: "3"
    networks:
      - midway-net

volumes:
  postgres_data:
  redis_data:

networks:
  midway-net:
    driver: bridge
  ggdc-shared-net:
    external: true
